name: Product Catalog CI

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: modi123/productcatalog

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Clone proto repo (IMPORTANT)
      - name: Clone proto repo
        run: |
          git clone https://github.com/modi-guru/OTEL-PROTO.git
          mkdir -p genproto
          cp OTEL-PROTO/demo.proto genproto/

      # 3. Set image tag
      - name: Set image tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # 4. Setup buildx (multi-arch support)
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Login DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Build & Push image
      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME }}:${{ env.TAG }}

      # 7. Update GitOps repo (CD)
      - name: Update Helm values
        env:
          TAG: ${{ env.TAG }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -e

          git clone https://x-access-token:$GH_TOKEN@github.com/modi-guru/otel-observability-k8s-demo.git
          cd otel-observability-k8s-demo

          # install yq
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

          # 🔥 update ONLY productcatalog tag
          yq -i '.productcatalog.image.tag = env(TAG)' values.yaml

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add values.yaml
          git commit -m "update productcatalog image to $TAG" || echo "no changes"
          git push